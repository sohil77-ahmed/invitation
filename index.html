<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Invitation</title>

    <link rel="stylesheet" href="style.css?v=3">
</head>
<body class="locked">

    <!-- MUSIC -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- ENVELOPE -->
    <section id="envelopeSection">

        <img
            id="envelope"
            src="images/1.webp?v=3"
            alt="Open Invitation"
        >

    </section>

    <!-- INVITATION IMAGES -->

    <section id="invitationStart" class="slide">
        <img src="images/2.webp?v=3" alt="">
    </section>
    
    <section class="slide-s">
        <img src="images/4.webp?v=3" alt="">
    </section>
    
    <section class="slide-s">
        <img src="images/5.webp?v=3" alt="">
    </section>

    <!-- COUNTDOWN -->

    <section class="countdown-section">

        <div class="countdown-content">

            <h1 class="title">
                Save The Date
            </h1>

            <p class="event-date">
                26 • 6 • 2026
            </p>

            <div class="countdown">

                <div class="box">
                    <span id="days">00</span>
                    <small>Days</small>
                </div>

                <div class="box">
                    <span id="hours">00</span>
                    <small>Hours</small>
                </div>

                <div class="box">
                    <span id="minutes">00</span>
                    <small>Minutes</small>
                </div>

                <div class="box">
                    <span id="seconds">00</span>
                    <small>Seconds</small>
                </div>

            </div>

            <p class="event-date-2">
                Location: Palm beach , Remal Venue 
            </p>

        </div>

    </section>

    <section class="slide">
        <img src="images/3.webp?v=3" alt="">
    </section>

    <script src="script.js"></script>

</body>
</html>
