<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engagement Invitation</title>

    <link rel="stylesheet" href="style.css">
</head>
<body class="locked">

    <!-- MUSIC -->
    <audio id="bgMusic" loop>
        <source src="music.m4a" type="audio/mpeg">
    </audio>

    <!-- ENVELOPE -->
    <section id="envelopeSection">

        <img
            id="envelope"
            src="images/1.png"
            alt="Open Invitation"
        >

    </section>

    <!-- INVITATION IMAGES -->

    <section id="invitationStart" class="slide">
        <img src="images/2.png" alt="">
    </section>

    <section class="slide">
        <img src="images/3.png" alt="">
    </section>

    <section class="slide">
        <img src="images/4.png" alt="">
    </section>

    <section class="slide">
        <img src="images/5.png" alt="">
    </section>

    <!-- COUNTDOWN -->

    <section class="countdown-section">

        <div class="countdown-content">

            <h1 class="title">
                Save The Date
            </h1>

            <p class="event-date">
                June 26, 2026 • 5:00 PM
            </p>

            <div class="countdown">

                <div class="box">
                    <span id="days">00</span>
                    <small>Days</small>
                </div>

                <div class="box">
                    <span id="hours">00</span>
                    <small>Hours</small>
                </div>

                <div class="box">
                    <span id="minutes">00</span>
                    <small>Minutes</small>
                </div>

                <div class="box">
                    <span id="seconds">00</span>
                    <small>Seconds</small>
                </div>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
